<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KONKURSOX — Sala</title>
  <link rel="stylesheet" href="css/sala.css" />
</head>
<body>

<!-- ══════════════════════════════════════════
     PANTALLA 1: Unirse a la sala
═══════════════════════════════════════════ -->
<section id="screen-join" class="screen activa">
  <div class="logo-sala">KONKURSOX<span>Sala de participantes</span></div>

  <div class="card-sala">
    <label class="label-sala" for="inp-codigo">Código de sala</label>
    <input id="inp-codigo" class="input-sala" type="text"
           maxlength="4" placeholder="XXXX"
           autocomplete="off" autocorrect="off" spellcheck="false" />

    <label class="label-sala" for="inp-nombre">Tu nombre</label>
    <input id="inp-nombre" class="input-nombre" type="text"
           maxlength="24" placeholder="Escribe tu nombre"
           autocomplete="off" />

    <button class="btn-sala btn-dorado" onclick="unirse()">Entrar a la sala</button>
  </div>

  <div id="estado-join" class="msg-sala"></div>
</section>

<!-- ══════════════════════════════════════════
     PANTALLA 2: Lobby — esperando al presentador
═══════════════════════════════════════════ -->
<section id="screen-lobby" class="screen">
  <div class="logo-sala">KONKURSOX<span>Sala de espera</span></div>

  <div id="join-conexion" class="estado-conexion conectando">
    <div class="estado-dot"></div>
    <span id="join-conexion-texto">Conectando…</span>
  </div>

  <div class="card-sala" style="text-align:center">
    <div class="label-sala" style="margin-bottom:6px">Sala</div>
    <div class="codigo-sala" id="lobby-codigo">----</div>
    <p class="msg-sala">Esperando al presentador…</p>
  </div>

  <div class="card-sala">
    <div class="label-sala">Participantes</div>
    <div class="lista-participantes" id="lobby-lista"></div>
  </div>
</section>

<!-- ══════════════════════════════════════════
     PANTALLA 3: Juego — pregunta + voto
═══════════════════════════════════════════ -->
<section id="screen-game" class="screen">
  <div id="game-conexion" class="estado-conexion conectado" style="align-self:flex-start;padding:0 2px 8px">
    <div class="estado-dot"></div>
    <span id="game-conexion-texto">Conectado</span>
  </div>

  <!-- Timer del participante -->
  <div id="game-timer-wrap" style="display:none;width:100%;margin-bottom:8px">
    <div style="height:6px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden">
      <div id="game-timer-bar" style="height:100%;background:var(--verde);border-radius:3px;transition:width 1s linear;width:100%"></div>
    </div>
    <div id="game-timer-num" style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--verde);text-align:center;margin-top:4px">--</div>
  </div>

  <div id="pregunta-display" class="pregunta-sala" style="display:none"></div>

  <div id="opciones-container" class="opciones-voto"></div>

  <div id="msg-game" class="msg-sala" style="margin-top:8px;font-size:13px"></div>
</section>

<!-- ══════════════════════════════════════════
     PANTALLA 4: Resultado personal
═══════════════════════════════════════════ -->
<section id="screen-resultado" class="screen">
  <div id="resultado-icono" style="font-size:72px;margin-bottom:8px;text-align:center">⏳</div>
  <div id="resultado-titulo" style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-align:center;color:var(--dorado);margin-bottom:12px">–</div>
  <div class="card-sala" style="text-align:center;width:100%;max-width:340px">
    <div id="resultado-puntos-ronda" style="font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;color:var(--dorado);line-height:1.1">+0 pts</div>
    <div id="resultado-puntos-total" style="font-size:14px;color:var(--text-muted);margin-top:6px">Total: 0 pts</div>
    <div id="resultado-posicion" style="font-size:13px;color:var(--text-muted);margin-top:4px">Posición: –</div>
  </div>
  <div id="resultado-espera" class="msg-sala" style="margin-top:16px;font-size:13px;color:var(--text-muted)">Esperando siguiente pregunta…</div>
</section>

<!-- ── Toast ── -->
<div id="toast-sala"></div>

<!-- ── Scripts ── -->
<script>window.CONFIG = { adminPassword: 'konkursox2025', ablyApiKey: 'yQeXgw.1Jo5mQ:2YF8c1KzGBLjzIxRma7D0MwPkMM5GhYOT3r6v7FPHQ8' };</script>
<script src="config.js" onerror=""></script>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script src="js/online.js"></script>
<script>
'use strict';

const LETRAS = ['A', 'B', 'C', 'D', 'E'];

// ── Estado local ──────────────────────────────────────────────
let myName             = '';
let myId               = '';
let roomCode           = '';
let myVote             = -1;   // -1 = sin voto
let myPoints           = 0;
let currentQuestionNum = 0;
let timerMax           = 30;
let timerInterval      = null;
let lastOpciones       = [];
let localStream        = null;
let peerConns          = {};

// ── Leer room de URL ──────────────────────────────────────────
(function () {
  const p = new URLSearchParams(location.search);
  if (p.get('room')) {
    const el = document.getElementById('inp-codigo');
    if (el) el.value = p.get('room').toUpperCase();
  }
})();

// ── Utilidades ────────────────────────────────────────────────
function mostrarScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('activa'));
  const el = document.getElementById(id);
  if (el) el.classList.add('activa');
}

function toastSala(msg, tipo = 'info') {
  const c = document.getElementById('toast-sala');
  if (!c) return;
  const t = document.createElement('div');
  t.className = `toast-sala-item ${tipo}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function setConexion(el, estado) {
  ['conectado', 'conectando', 'error'].forEach(e => el.classList.remove(e));
  el.classList.add(estado);
}

// ── Conectar ──────────────────────────────────────────────────
function unirse() {
  const codigo  = (document.getElementById('inp-codigo')?.value || '').trim().toUpperCase();
  const nombre  = (document.getElementById('inp-nombre')?.value || '').trim();
  const errorEl = document.getElementById('estado-join');

  if (codigo.length < 2) { if (errorEl) errorEl.textContent = 'Escribe el código de sala.'; return; }
  if (!nombre)            { if (errorEl) errorEl.textContent = 'Escribe tu nombre.'; return; }
  if (errorEl) errorEl.textContent = '';

  roomCode = codigo;
  myName   = nombre;

  const apiKey = (window.CONFIG?.ablyApiKey || '').trim();
  if (!apiKey) {
    if (errorEl) errorEl.textContent = 'API Key de Ably no configurada. Contacta al organizador.';
    return;
  }

  document.getElementById('lobby-codigo').textContent = roomCode;
  mostrarScreen('screen-lobby');
  setConexion(document.getElementById('join-conexion'), 'conectando');
  document.getElementById('join-conexion-texto').textContent = 'Conectando…';

  _initOnline(apiKey);
}

function _initOnline(apiKey) {
  OnlineLayer.on('connected', () => {
    myId = OnlineLayer.getMyId();
    setConexion(document.getElementById('join-conexion'), 'conectado');
    document.getElementById('join-conexion-texto').textContent = 'Conectado';
  });

  OnlineLayer.on('disconnected', () => {
    clearInterval(timerInterval);
    _stopTimerVisual();
    setConexion(document.getElementById('join-conexion'), 'conectando');
    document.getElementById('join-conexion-texto').textContent = 'Reconectando…';
    const gc = document.getElementById('game-conexion');
    if (gc) setConexion(gc, 'conectando');
    const gt = document.getElementById('game-conexion-texto');
    if (gt) gt.textContent = 'Reconectando…';
  });

  OnlineLayer.on('hello_ack', (msg) => {
    myId = msg.payload?.id || OnlineLayer.getMyId();
  });

  OnlineLayer.on('participants_list', (msg) => {
    renderLobbyLista(msg.payload || []);
  });

  OnlineLayer.on('participant_joined', (msg) => {
    addLobbyItem(msg.payload);
  });

  OnlineLayer.on('participant_left', (msg) => {
    removeLobbyItem(msg.payload?.id);
  });

  // ── Mensajes del juego ────────────────────────────────────

  OnlineLayer.on('show_question', (msg) => {
    const d = msg.payload;
    currentQuestionNum = d.questionNum ?? (currentQuestionNum + 1);
    timerMax    = d.timeLimit ?? 30;
    myVote      = -1;
    lastOpciones = d.options || [];

    mostrarScreen('screen-game');
    setConexion(document.getElementById('game-conexion'), 'conectado');
    document.getElementById('game-conexion-texto').textContent = 'Conectado';

    const pregEl = document.getElementById('pregunta-display');
    if (pregEl) { pregEl.style.display = 'block'; pregEl.textContent = d.question || ''; }

    renderOpciones(lastOpciones);

    const msgEl = document.getElementById('msg-game');
    if (msgEl) msgEl.textContent = '¡Vota ahora!';

    _startTimerVisual(timerMax);
  });

  OnlineLayer.on('timer_tick', (msg) => {
    const v = msg.payload?.value ?? 0;
    const m = msg.payload?.max   ?? timerMax;
    timerMax = m;
    clearInterval(timerInterval); // usar el tick del servidor como fuente de verdad
    _setTimerVisual(v, m);
  });

  OnlineLayer.on('reveal_answer', (msg) => {
    const d = msg.payload;
    clearInterval(timerInterval);
    _stopTimerVisual();

    const correctIdx = d.correctIndex ?? -1;
    const scoresArr  = d.scores       || [];

    // Resultado propio
    const myResult = scoresArr.find(s => s.id === myId);
    const correct  = myVote !== -1 && myVote === correctIdx;
    const points   = myResult?.roundPoints ?? (correct ? 1000 : 0);
    myPoints       = myResult?.total ?? (myPoints + points);
    const rank     = myResult
      ? scoresArr.findIndex(s => s.id === myId) + 1
      : scoresArr.length + 1;

    mostrarResultado(correct, points, rank);
  });

  OnlineLayer.on('next_question', () => {
    // El panel enviará show_question a continuación; preparamos la transición
    mostrarScreen('screen-lobby');
    myVote = -1;
    clearInterval(timerInterval);
    _stopTimerVisual();
    const msgEl = document.getElementById('msg-game');
    if (msgEl) msgEl.textContent = '';
  });

  OnlineLayer.on('game_over', (msg) => {
    clearInterval(timerInterval);
    _stopTimerVisual();
    const scoresArr = msg.payload?.scores || [];
    const myResult  = scoresArr.find(s => s.id === myId);
    const rank      = scoresArr.findIndex(s => s.id === myId) + 1;
    mostrarFinJuego(myResult?.total ?? myPoints, rank > 0 ? rank : scoresArr.length + 1, scoresArr.length);
  });

  OnlineLayer.on('kicked', (msg) => {
    // Sin payload de id significa que el mensaje nos incluye; o comprobamos el id
    const targetId = msg.payload?.id;
    if (targetId && targetId !== myId) return;
    clearInterval(timerInterval);
    OnlineLayer.disconnect();
    mostrarScreen('screen-join');
    document.getElementById('estado-join').textContent = 'Has sido expulsado de la sala.';
    toastSala('Expulsado de la sala', 'error');
  });

  OnlineLayer.on('webrtc_offer', (msg) => { if (localStream) manejarWebRTCOffer(msg.payload); });
  OnlineLayer.on('webrtc_ice',   (msg) => { if (localStream) manejarWebRTCIce(msg.payload); });

  OnlineLayer.connect(roomCode, 'sala', apiKey, myName, false);
}

// ── Lobby ─────────────────────────────────────────────────────
function renderLobbyLista(lista) {
  const el = document.getElementById('lobby-lista');
  if (!el) return;
  el.innerHTML = '';
  lista.filter(p => p.role === 'sala').forEach(p => el.appendChild(_itemParticipante(p)));
}

function addLobbyItem(p) {
  if (!p || p.role !== 'sala') return;
  const el = document.getElementById('lobby-lista');
  if (!el || el.querySelector(`[data-id="${p.id}"]`)) return;
  el.appendChild(_itemParticipante(p));
}

function removeLobbyItem(id) {
  document.querySelector(`[data-id="${id}"]`)?.remove();
}

function _itemParticipante(p) {
  const div      = document.createElement('div');
  div.className  = 'participante-item';
  div.dataset.id = p.id;
  const av       = document.createElement('div');
  av.className   = 'participante-avatar';
  av.textContent = (p.name || '?')[0].toUpperCase();
  const nm       = document.createElement('span');
  nm.textContent = p.name || '?';
  div.appendChild(av);
  div.appendChild(nm);
  return div;
}

// ── Opciones ──────────────────────────────────────────────────
function renderOpciones(opciones) {
  const el = document.getElementById('opciones-container');
  if (!el) return;
  el.innerHTML = '';
  opciones.forEach((op, i) => {
    if (!op && op !== 0) return;
    const btn      = document.createElement('button');
    btn.className  = 'opcion-voto' + (myVote === i ? ' seleccionada' : '');
    btn.dataset.idx = i;
    btn.innerHTML  = `<span class="opcion-letra">${LETRAS[i]}</span><span>${op}</span>`;
    btn.addEventListener('click', () => votar(i));
    el.appendChild(btn);
  });
}

function votar(idx) {
  myVote = idx;

  // Publicar voto (o cambio de voto)
  OnlineLayer.publish({ type: 'vote', payload: { option: idx, questionNum: currentQuestionNum } });

  // Resaltar selección
  document.querySelectorAll('#opciones-container .opcion-voto').forEach((btn, i) => {
    btn.classList.toggle('seleccionada', i === idx);
  });

  const msgEl = document.getElementById('msg-game');
  if (msgEl) msgEl.textContent = `Votaste ${LETRAS[idx]}. Puedes cambiar tu voto.`;
}

// ── Timer visual ──────────────────────────────────────────────
function _startTimerVisual(max) {
  clearInterval(timerInterval);
  _setTimerVisual(max, max);
  document.getElementById('game-timer-wrap').style.display = 'block';

  // Timer local como fallback si no llegan timer_tick del panel
  timerInterval = setInterval(() => {
    const numEl = document.getElementById('game-timer-num');
    const cur   = parseInt(numEl?.textContent || '0');
    if (isNaN(cur) || cur <= 0) { clearInterval(timerInterval); return; }
    _setTimerVisual(cur - 1, timerMax);
  }, 1000);
}

function _setTimerVisual(val, max) {
  const numEl = document.getElementById('game-timer-num');
  const barEl = document.getElementById('game-timer-bar');
  if (numEl) numEl.textContent = val;
  const pct   = max > 0 ? val / max : 0;
  const color = pct > .5 ? 'var(--verde)' : pct > .25 ? 'var(--naranja)' : 'var(--rojo)';
  if (barEl) { barEl.style.width = (pct * 100) + '%'; barEl.style.background = color; }
  if (numEl) numEl.style.color = color;
}

function _stopTimerVisual() {
  clearInterval(timerInterval);
  const wrap = document.getElementById('game-timer-wrap');
  if (wrap) wrap.style.display = 'none';
}

// ── Resultado personal ────────────────────────────────────────
function mostrarResultado(correct, points, rank) {
  document.getElementById('resultado-icono').textContent       = correct ? '✅' : '❌';
  document.getElementById('resultado-titulo').textContent      = correct ? '¡Correcto!' : 'Incorrecto';
  document.getElementById('resultado-puntos-ronda').textContent = correct ? `+${points} pts` : '0 pts';
  document.getElementById('resultado-puntos-total').textContent = `Total: ${myPoints} pts`;
  document.getElementById('resultado-posicion').textContent     = rank > 0 ? `Posición: #${rank}` : 'Posición: –';
  document.getElementById('resultado-espera').textContent       = 'Esperando siguiente pregunta…';
  mostrarScreen('screen-resultado');
}

function mostrarFinJuego(total, rank, totalPlayers) {
  document.getElementById('resultado-icono').textContent        = rank === 1 ? '🏆' : '🎉';
  document.getElementById('resultado-titulo').textContent       = rank === 1 ? '¡Ganaste!' : `#${rank} de ${totalPlayers}`;
  document.getElementById('resultado-puntos-ronda').textContent = `${total} pts totales`;
  document.getElementById('resultado-puntos-total').textContent = '';
  document.getElementById('resultado-posicion').textContent     = '';
  document.getElementById('resultado-espera').textContent       = '¡Gracias por jugar!';
  mostrarScreen('screen-resultado');
}

// ── WebRTC (modo WiFi) ────────────────────────────────────────
async function manejarWebRTCOffer(payload) {
  if (!localStream || !payload) return;
  const overlayId = payload.from;
  if (!overlayId) return;
  const pc = new RTCPeerConnection({ iceServers: [] });
  peerConns[overlayId] = pc;
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = (e) => {
    if (e.candidate) OnlineLayer.publish({ type: 'webrtc_ice', payload: { to: overlayId, from: myId, candidate: e.candidate } });
  };
  await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  OnlineLayer.publish({ type: 'webrtc_answer', payload: { to: overlayId, from: myId, sdp: pc.localDescription } });
}

async function manejarWebRTCIce(payload) {
  if (!payload?.candidate) return;
  const pc = peerConns[payload.from];
  if (!pc) return;
  try { await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); } catch {}
}
</script>
</body>
</html>
